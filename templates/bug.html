<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bug Report</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <div id="root"></div>

    <!-- Add React via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    {% verbatim %}
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [formData, setFormData] = useState({
                title: '',
                description: '',
                severity: 'low',
                status: 'open',
                reporter_name: '',
                reporter_email: '',
                reporter_phone_number: '',
                reporter_info: '',
            });

            const [submitted, setSubmitted] = useState(false);
            const [error, setError] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);

            function handleChange(e) {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            }
            async function handleSubmit(e) {
                e.preventDefault();
                if (isSubmitting) return;
                setIsSubmitting(true);
                try {
                    const response = await fetch('/api/reports/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(formData),
                    });

                    if (response.ok) {
                        setSubmitted(true);
                        setError(null);
                    } else {
                        const data = await response.json();
                        setError(JSON.stringify(data));
                    }
                } catch (err) {
                    setError('Failed to connect to server.');
                } finally {
                    setIsSubmitting(false);
                }
            }

            if (submitted) {
                return (
                    <div style={styles.center}>
                        <div style={styles.card}>
                            <div style={styles.successBox}>
                                <div style={styles.successIcon}><span className="material-icons">verified_user</span></div>
                                <h2 style={styles.successTitle}>Report Submitted!</h2>
                                <p style={styles.successText}>Thank you! Your bug report has been received and will be reviewed shortly.</p>
                                <button
                                    style={styles.btn}
                                    onClick={() => {
                                        setSubmitted(false);
                                        setFormData({
                                            title: '',
                                            description: '',
                                            severity: 'low',
                                            status: 'open',
                                            reporter_name: '',
                                            reporter_email: '',
                                            reporter_phone_number: '',
                                            reporter_info: '',
                                        });
                                    }}
                                >
                                    Submit Another Report
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div style={styles.center}>
                    <div style={styles.card}>
                        <h1 style={styles.heading}> Bug Report</h1>

                        {error && <p style={styles.error}>{error}</p>}

                        <form onSubmit={handleSubmit}>

                            <Field label="Title *">
                                <input
                                    style={styles.input}
                                    name="title"
                                    value={formData.title}
                                    onChange={handleChange}
                                    placeholder="Short bug title"
                                    required
                                />
                            </Field>

                            <Field label="Description *">
                                <textarea
                                    style={{ ...styles.input, height: '100px' }}
                                    name="description"
                                    value={formData.description}
                                    onChange={handleChange}
                                    placeholder="Describe the bug in detail"
                                    required
                                />
                            </Field>

                            <div style={styles.row}>
                                <Field label="Severity *">
                                    <select
                                        style={styles.input}
                                        name="severity"
                                        value={formData.severity}
                                        onChange={handleChange}
                                    >
                                        <option value="low">Low</option>
                                        <option value="medium">Medium</option>
                                        <option value="high">High</option>
                                        <option value="critical">Critical</option>
                                    </select>
                                </Field>

                                <Field label="Status *">
                                    <select
                                        style={styles.input}
                                        name="status"
                                        value={formData.status}
                                        onChange={handleChange}
                                    >
                                        <option value="open">Open</option>
                                        <option value="in_progress">In Progress</option>
                                        <option value="resolved">Resolved</option>
                                        <option value="closed">Closed</option>
                                    </select>
                                </Field>
                            </div>

                            <div style={styles.row}>
                                <Field label="Your Name *">
                                    <input
                                        style={styles.input}
                                        name="reporter_name"
                                        value={formData.reporter_name}
                                        onChange={handleChange}
                                        placeholder="John Doe"
                                        required
                                    />
                                </Field>

                                <Field label="Email *">
                                    <input
                                        style={styles.input}
                                        type="email"
                                        name="reporter_email"
                                        value={formData.reporter_email}
                                        onChange={handleChange}
                                        placeholder="john@example.com"
                                        required
                                    />
                                </Field>
                            </div>

                            <Field label="Phone Number *">
                                <input
                                    style={styles.input}
                                    name="reporter_phone_number"
                                    value={formData.reporter_phone_number}
                                    onChange={handleChange}
                                    placeholder="+977 986005604"
                                    required
                                />
                            </Field>

                            <Field label="Additional Info">
                                <textarea
                                    style={{ ...styles.input, height: '80px' }}
                                    name="reporter_info"
                                    value={formData.reporter_info}
                                    onChange={handleChange}
                                    placeholder="Any extra details (optional)"
                                />
                            </Field>

                            <button type="submit" style={{ ...styles.btn, opacity: isSubmitting ? 0.7 : 1 }} disabled={isSubmitting}>
                                {isSubmitting ? 'Submitting...' : 'Submit Bug Report'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // ── Reusable Field wrapper ───────────────────────────────────────
        function Field({ label, children }) {
            return (
                <div style={styles.field}>
                    <label style={styles.label}>{label}</label>
                    {children}
                </div>
            )
        }
        // ── Styles ───────────────────────────────────────────────────────
        const styles = {
            center: {
                minHeight: '100vh',
                display: 'flex',
                justifyContent: 'center',
                alignItems: 'flex-start',
                padding: '40px 16px',
                background: '#f0f2f5',
            },
            card: {
                background: '#fff',
                borderRadius: '12px',
                padding: '32px',
                width: '100%',
                maxWidth: '640px',
                boxShadow: '0 4px 20px rgba(0,0,0,0.1)',
            },
            heading: {
                marginBottom: '24px',
                fontSize: '24px',
                color: '#1a1a2e',
            },
            row: {
                display: 'grid',
                gridTemplateColumns: '1fr 1fr',
                gap: '16px',
            },
            field: {
                marginBottom: '16px',
            },
            label: {
                display: 'block',
                marginBottom: '6px',
                fontWeight: '600',
                fontSize: '14px',
                color: '#444',
            },
            input: {
                width: '100%',
                padding: '10px 12px',
                border: '1px solid #ddd',
                borderRadius: '8px',
                fontSize: '14px',
                outline: 'none',
            },
            btn: {
                width: '100%',
                padding: '12px',
                background: '#4f46e5',
                color: '#fff',
                border: 'none',
                borderRadius: '8px',
                fontSize: '16px',
                cursor: 'pointer',
                marginTop: '8px',
            },
            error: {
                background: '#fee2e2',
                color: '#dc2626',
                padding: '10px',
                borderRadius: '8px',
                marginBottom: '16px',
                fontSize: '14px',
            },
            successBox: {
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                padding: '24px 0',
                textAlign: 'center',
            },
            successIcon: {
                fontSize: '56px',
                marginBottom: '16px',
            },
            successTitle: {
                fontSize: '22px',
                fontWeight: '700',
                color: '#16a34a',
                marginBottom: '8px',
            },
            successText: {
                fontSize: '14px',
                color: '#555',
                marginBottom: '24px',
                lineHeight: '1.6',
            },
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />)
    </script>
    {% endverbatim %}
</body>

</html>
